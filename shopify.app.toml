# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9d489874d40162f0b8b3fb82d574188f"
name = "comboloco"
application_url = "https://example.com"
embedded = true

[access_scopes]
scopes = "write_products,write_metaobjects,write_metaobject_definitions,read_products,write_discounts"

[product.metafields.quantity_breaks.config]
type = "json"
name = "Quantity Breaks Config"
description = "Tier configuration read by the Shopify Function discount"

  [product.metafields.quantity_breaks.config.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[app_proxy]
url = "https://example.com/api/widget"
subpath = "comboloco"
prefix = "apps"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
automatically_update_urls_on_dev = true
